name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: mercer-voice-electron

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS build job
          - os: macos-latest
            release_cmd: npm run release:mac
          # Windows build job
          - os: windows-latest
            release_cmd: npm run release:win
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync package.json version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [ -n "$TAG" ] && [ "$TAG" != "$GITHUB_REF" ]; then
            npm version "$TAG" --no-git-tag-version --allow-same-version
          fi
        shell: bash

      - name: Install npm dependencies
        run: npm ci

      - name: Upscale icon to 512x512 for macOS build
        if: runner.os == 'macOS'
        run: sips -z 512 512 build/icon.png --out build/icon.png

      - name: Upscale icon and regenerate ICO for Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $src = [System.Drawing.Image]::FromFile("$PWD\build\icon.png")
          $bmp = New-Object System.Drawing.Bitmap(256, 256)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
          $g.DrawImage($src, 0, 0, 256, 256)
          $g.Dispose(); $src.Dispose()
          $ms = New-Object System.IO.MemoryStream
          $bmp.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
          $png = $ms.ToArray()
          $ms.Dispose(); $bmp.Dispose()
          [System.IO.File]::WriteAllBytes("$PWD\build\icon.png", $png)
          # Rebuild icon.ico with the 256x256 PNG embedded
          $ico = New-Object byte[](22 + $png.Length)
          $ico[2] = 1; $ico[4] = 1
          $ico[6] = 0; $ico[7] = 0; $ico[10] = 1; $ico[12] = 32
          [System.Array]::Copy([BitConverter]::GetBytes([uint32]$png.Length), 0, $ico, 14, 4)
          [System.Array]::Copy([BitConverter]::GetBytes([uint32]22), 0, $ico, 18, 4)
          [System.Array]::Copy($png, 0, $ico, 22, $png.Length)
          [System.IO.File]::WriteAllBytes("$PWD\build\icon.ico", $ico)
          Write-Host "icon.png -> 256x256, icon.ico regenerated"

      - name: Build & Publish Release
        run: ${{ matrix.release_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
